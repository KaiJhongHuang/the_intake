<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>The Intake — 每日知識摘要</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f8f9fa;
      --text: #1a1a1a;
      --text-secondary: #6b7280;
      --card-bg: #ffffff;
      --card-border: #e5e7eb;
      --card-hover-shadow: 0 4px 12px rgba(0,0,0,0.08);
      --input-bg: #f3f4f6;
      --input-border: #d1d5db;
      --link-color: #2563eb;
      --divider: #e5e7eb;
      --tag-text: #ffffff;
      --active-tab-bg: #1a1a1a;
      --active-tab-text: #ffffff;
      --tab-bg: #f3f4f6;
      --tab-text: #4b5563;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #0f1117;
        --bg-secondary: #1a1d27;
        --text: #e5e7eb;
        --text-secondary: #9ca3af;
        --card-bg: #1a1d27;
        --card-border: #2d3148;
        --card-hover-shadow: 0 4px 12px rgba(0,0,0,0.3);
        --input-bg: #1a1d27;
        --input-border: #2d3148;
        --link-color: #60a5fa;
        --divider: #2d3148;
        --active-tab-bg: #e5e7eb;
        --active-tab-text: #0f1117;
        --tab-bg: #1a1d27;
        --tab-text: #9ca3af;
      }
    }

    [data-theme="dark"] {
      --bg: #0f1117;
      --bg-secondary: #1a1d27;
      --text: #e5e7eb;
      --text-secondary: #9ca3af;
      --card-bg: #1a1d27;
      --card-border: #2d3148;
      --card-hover-shadow: 0 4px 12px rgba(0,0,0,0.3);
      --input-bg: #1a1d27;
      --input-border: #2d3148;
      --link-color: #60a5fa;
      --divider: #2d3148;
      --active-tab-bg: #e5e7eb;
      --active-tab-text: #0f1117;
      --tab-bg: #1a1d27;
      --tab-text: #9ca3af;
    }

    [data-theme="sepia"] {
      --bg: #f4ecd8;
      --bg-secondary: #ede3cc;
      --text: #5b4636;
      --text-secondary: #8b7355;
      --card-bg: #f9f3e3;
      --card-border: #d4c5a9;
      --card-hover-shadow: 0 4px 12px rgba(91,70,54,0.1);
      --input-bg: #ede3cc;
      --input-border: #d4c5a9;
      --link-color: #8b5e3c;
      --divider: #d4c5a9;
      --tag-text: #ffffff;
      --active-tab-bg: #5b4636;
      --active-tab-text: #f4ecd8;
      --tab-bg: #ede3cc;
      --tab-text: #8b7355;
    }

    [data-theme="moss"] {
      --bg: #1a2a1a;
      --bg-secondary: #223322;
      --text: #c8d8c0;
      --text-secondary: #8a9a82;
      --card-bg: #223322;
      --card-border: #3a4a3a;
      --card-hover-shadow: 0 4px 12px rgba(0,0,0,0.3);
      --input-bg: #223322;
      --input-border: #3a4a3a;
      --link-color: #7ab87a;
      --divider: #3a4a3a;
      --tag-text: #ffffff;
      --active-tab-bg: #c8d8c0;
      --active-tab-text: #1a2a1a;
      --tab-bg: #223322;
      --tab-text: #8a9a82;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      position: relative;
      padding: 48px 0 32px;
      padding-top: calc(48px + env(safe-area-inset-top));
      text-align: center;
      border-bottom: 1px solid var(--divider);
    }

    #theme-toggle {
      position: absolute;
      top: 16px;
      right: 0;
      padding: 6px 14px;
      min-height: 36px;
      border-radius: 18px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    #theme-toggle:hover {
      border-color: var(--text-secondary);
      color: var(--text);
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* Nav / Filters */
    nav {
      padding: 24px 0 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--divider);
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 8px 16px;
      min-height: 44px;
      border-radius: 20px;
      border: 1px solid var(--input-border);
      background: var(--tab-bg);
      color: var(--tab-text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
    }

    .filter-tab:hover {
      border-color: var(--text-secondary);
    }

    .filter-tab.active {
      background: var(--active-tab-bg);
      color: var(--active-tab-text);
      border-color: var(--active-tab-bg);
    }

    .search-box {
      margin-left: auto;
    }

    .search-box input {
      padding: 10px 16px;
      min-height: 44px;
      border-radius: 20px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input::placeholder {
      color: var(--text-secondary);
    }

    .search-box input:focus {
      border-color: var(--link-color);
    }

    /* Main layout - single column */
    main {
      padding: 24px 0;
      min-height: calc(100vh - 280px);
    }

    /* Article list */
    #article-list {
      max-width: 800px;
      margin: 0 auto;
    }

    .date-group {
      margin-bottom: 24px;
    }

    .date-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .article-card {
      padding: 16px 20px;
      min-height: 44px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .article-card:hover {
      box-shadow: var(--card-hover-shadow);
      border-color: var(--text-secondary);
    }

    .article-card:active {
      transform: scale(0.98);
    }

    .category-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--tag-text);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .article-info {
      flex: 1;
      min-width: 0;
    }

    .article-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.5;
    }


    /* Preview pane - hidden by default */
    #preview-pane {
      display: none;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Reading mode */
    .reading-mode nav {
      display: none;
    }

    .reading-mode #article-list {
      display: none;
    }

    .reading-mode #preview-pane {
      display: block;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 10px 0;
      min-height: 44px;
      background: none;
      border: none;
      color: var(--link-color);
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .back-btn:hover {
      text-decoration: underline;
    }

    .back-btn:active {
      opacity: 0.6;
    }

    /* Markdown content styling */
    .markdown-body h1 { font-size: 1.5rem; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--divider); }
    .markdown-body h2 { font-size: 1.25rem; margin: 24px 0 12px; }
    .markdown-body h3 { font-size: 1.1rem; margin: 20px 0 8px; }
    .markdown-body p { margin: 8px 0; }
    .markdown-body .news-item { margin: 12px 0; line-height: 1.6; }
    .markdown-body .news-item .news-headline { display: block; font-size: 1rem; font-weight: 700; }
    .markdown-body .news-item .news-idx { color: var(--text-secondary); font-size: 0.85rem; margin-right: 2px; }
    .markdown-body .news-item .news-desc { display: block; font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; margin-top: 2px; }
    .markdown-body a { color: var(--link-color); text-decoration: none; word-break: break-all; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body strong { font-weight: 700; }
    .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 8px 0; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body code { background: var(--input-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
    .markdown-body pre { background: var(--input-bg); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; -webkit-overflow-scrolling: touch; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body blockquote { border-left: 3px solid var(--divider); padding-left: 16px; color: var(--text-secondary); margin: 12px 0; }
    .markdown-body hr { border: none; border-top: 1px solid var(--divider); margin: 20px 0; }

    /* Empty state */
    .no-results {
      text-align: center;
      color: var(--text-secondary);
      padding: 48px 0;
      font-size: 0.95rem;
    }

    /* Footer */
    footer {
      padding: 24px 0;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      text-align: center;
      border-top: 1px solid var(--divider);
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--text);
    }

    /* Loading spinner */
    .loading {
      text-align: center;
      color: var(--text-secondary);
      padding: 32px;
    }

    /* Responsive - Mobile */
    @media (max-width: 768px) {
      .container {
        padding: 0 16px;
      }

      header {
        padding: 24px 0 16px;
        padding-top: calc(24px + env(safe-area-inset-top));
      }

      header h1 { font-size: 1.5rem; }

      #theme-toggle {
        top: 8px;
        right: 0;
        padding: 4px 10px;
        font-size: 0.75rem;
        min-height: 32px;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--bg);
        padding: 12px 0;
        flex-direction: column;
        align-items: stretch;
      }

      .filter-tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap;
        padding-bottom: 4px;
      }

      .filter-tab {
        flex-shrink: 0;
      }

      .search-box {
        margin-left: 0;
      }

      .search-box input {
        width: 100%;
      }

      .article-card {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button id="theme-toggle" title="切換閱讀模式"></button>
      <h1>The Intake</h1>
      <p>每日知識摘要</p>
    </header>

    <nav>
      <div class="filter-tabs" id="filter-tabs"></div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜尋文章標題...">
      </div>
    </nav>

    <main>
      <section id="article-list">
        <div class="loading">載入中...</div>
      </section>
      <aside id="preview-pane"></aside>
    </main>

    <footer>
      <a id="repo-link" href="#">GitHub</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const themes = ['auto', 'dark', 'sepia', 'moss'];
    const themeLabels = { auto: 'Auto', dark: 'Dark', sepia: 'Sepia', moss: 'Moss' };

    function applyTheme(theme) {
      if (theme === 'auto') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', theme);
      }
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = themeLabels[theme];
      localStorage.setItem('theme', theme);
    }

    (function() {
      const saved = localStorage.getItem('theme') || 'auto';
      applyTheme(saved);
    })();

    let data = null;
    let currentCategory = 'all';
    let currentSearch = '';
    let activeFile = null;
    let listScrollY = 0;

    async function init() {
      try {
        const res = await fetch('content.json?v=' + Date.now());
        data = await res.json();
      } catch {
        document.getElementById('article-list').innerHTML =
          '<div class="no-results">無法載入文章清單</div>';
        return;
      }

      const repoLink = document.getElementById('repo-link');
      repoLink.href = `https://github.com/${data.site.repo}`;
      repoLink.textContent = data.site.repo;

      data._catMap = {};
      data.categories.forEach(c => { data._catMap[c.id] = c; });

      document.getElementById('theme-toggle').addEventListener('click', () => {
        const current = localStorage.getItem('theme') || 'auto';
        const next = themes[(themes.indexOf(current) + 1) % themes.length];
        applyTheme(next);
      });

      renderTabs();
      renderArticles();

      document.getElementById('search-input').addEventListener('input', (e) => {
        currentSearch = e.target.value.trim().toLowerCase();
        renderArticles();
      });
    }

    function renderTabs() {
      const container = document.getElementById('filter-tabs');
      let html = `<button class="filter-tab active" data-cat="all">全部</button>`;
      data.categories.forEach(c => {
        html += `<button class="filter-tab" data-cat="${c.id}">${c.icon} ${c.name}</button>`;
      });
      container.innerHTML = html;

      container.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-tab');
        if (!btn) return;
        currentCategory = btn.dataset.cat;
        container.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderArticles();
      });
    }

    function getFilteredArticles() {
      return data.articles.filter(a => {
        if (currentCategory !== 'all' && a.category !== currentCategory) return false;
        if (currentSearch && !a.title.toLowerCase().includes(currentSearch)) return false;
        return true;
      });
    }

    function renderArticles() {
      const container = document.getElementById('article-list');
      const articles = getFilteredArticles();

      if (articles.length === 0) {
        container.innerHTML = '<div class="no-results">沒有找到符合條件的文章</div>';
        return;
      }

      articles.sort((a, b) => b.date.localeCompare(a.date));

      const groups = {};
      articles.forEach(a => {
        if (!groups[a.date]) groups[a.date] = [];
        groups[a.date].push(a);
      });

      let html = '';
      Object.keys(groups).sort().reverse().forEach(date => {
        html += `<div class="date-group">`;
        html += `<div class="date-label">${date}</div>`;
        groups[date].forEach(a => {
          const cat = data._catMap[a.category];
          html += `
            <div class="article-card" data-file="${a.file}" onclick="loadPreview('${a.file}')">
              <span class="category-badge" style="background:${cat ? cat.color : '#6b7280'}">${cat ? cat.icon : ''} ${cat ? cat.name : ''}</span>
              <div class="article-info">
                <div class="article-title">${escapeHtml(a.title)}</div>
              </div>
            </div>`;
        });
        html += `</div>`;
      });

      container.innerHTML = html;
    }

    function closePreview() {
      document.querySelector('main').classList.remove('reading-mode');
      document.getElementById('preview-pane').innerHTML = '';
      activeFile = null;
      window.scrollTo(0, listScrollY);
    }

    async function loadPreview(file) {
      activeFile = file;
      listScrollY = window.scrollY;

      const mainEl = document.querySelector('main');
      const pane = document.getElementById('preview-pane');

      mainEl.classList.add('reading-mode');
      pane.innerHTML = '<div class="loading">載入中...</div>';
      window.scrollTo(0, 0);

      try {
        const res = await fetch(file + '?v=' + Date.now());
        if (!res.ok) throw new Error('fetch failed');
        const md = await res.text();
        let parsed = marked.parse(md);
        parsed = parsed.replace(
          /<p>(\[(\d+)\])\s*<strong>([^<]+)<\/strong>[：:]\s*([\s\S]*?)<\/p>/g,
          (_, _full, idx, title, desc) =>
            `<div class="news-item"><span class="news-headline"><span class="news-idx">[${idx}]</span> ${title}</span><span class="news-desc">${desc}</span></div>`
        );
        pane.innerHTML = `<button class="back-btn" onclick="closePreview()">&#8592; 返回列表</button><div class="markdown-body">${parsed}</div>`;
      } catch {
        pane.innerHTML = `<button class="back-btn" onclick="closePreview()">&#8592; 返回列表</button><div class="no-results">無法載入文章內容</div>`;
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    init();
  </script>
</body>
</html>
